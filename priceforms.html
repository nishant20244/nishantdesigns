<!DOCTYPE html>
<html>
    <head>

    </head>
    <style>
        body{
            margin: auto;
            
        }
        .container{
            width: 100%;
            height: 650px;
            position: relative;
  
        }
        .box1{
           height: 70%;
            background-color: rgb(85, 9, 172);
        }
        .box2{
           height: 30%;
            background-color: rgb(204, 201, 201);
        }
        .container1{
            display: flex;
            position: absolute;
            width: 60%;
            margin-top: 10%;
            text-align: center;
            top: 50px;
            left: 250px;
     

        }
        .beginner{
            border: 2px solid black;
            width: 250px;
            height: 375px;
            margin: 10px;   
            position: relative;
            border-radius: 10px;
            background-color: rgb(245, 245, 245);
           

        }
        .expert{
            border: 2px solid black;
            width: 250px;
            height: 375px; 
            margin: 10px;
            margin-top: -4px;
            position: relative;
            border-radius: 10px;
            background-color: whitesmoke;
        
           

        }
        .experience{
            border: 2px solid black;
            width: 250px;
            height: 375px;
            margin: 10px;
            position: relative;
            border-radius: 10px;
            background-color: whitesmoke;

        }
        .topic{
            margin-top: 80px;
           
        }
        
        .pricebox {
            display: flex;
            margin-top: 30px;
            margin-left: 40px;
            margin-right: 40px;
            
        }

        .price {
            position: relative;
           
         }

      .dollar {
           display: inline-block;
            display: absolute;
            left: 50px;
            line-height: 1;
            font-size: 20px;
            color: rgb(255, 4, 4);
              }

        p{ 
            font-size: 80px;
            display: inline;
            line-height: .75;
            padding: 0px;
            color: rgb(85, 9, 172); ;
        }
        span{
            color: rgb(255, 4, 4);
            font-size: 20px;
        }
       
        .button{
            position: absolute;
            bottom: -15px;
            left: 75px;
            border-radius: 15px;
        }
        .button1{
            padding: 8px 10px;
            border-radius: 20px;
            background-color: rgb(0, 207, 128);
        }
        h1{
            display: inline;
            border-bottom: 2px solid lightgray;
            font-size: 16px;
            letter-spacing: 4px;

        }
        img{
            width: 80px;
            position: absolute;
            left: 90px;
            top: -40px;
            
        }
   

    </style>
    <body>
    <div class="container">

    <div class="box1"></div>
    <div class="box2"> </div>


    <div class="container1">

        <div class="beginner">
            <div class="topic"><h1>BEGINNER</h1></div><br>
            <div><img src="wallet.png" alt=""></div>


        <div class="pricebox">
            <div class="dollar"> $ </div> <div class="price"> <p> 49</p>   <span> /mo </span>  </div>
        </div><br><br>

        <div><img src="" alt=""></div>
            <div>Card servicing <br> for 1 month</div>
            <div class="button"><input class="button1" type="button" value="ORDER NOW "></div>
        </div>



        <div class="expert">
            <div class="topic"><h1>EXPERT</h1></div><br>
            <div><img src="laptop-icon-19508.png" alt=""></div>
         <div class="pricebox" >
            <div class="dollar"> $ </div> <div class="price">  <p>199</p>  <span> /mo  </span>  </div>
         </div><br><br>
            <div>Card servicing <br> for 6 month</div>
            <div class="button"><input class="button1" type="button" value="ORDER NOW "></div>
        </div>




        <div class="experience">
            <div class="topic"><h1>EXPERIENCE</h1></div><br>
           <div><img src="atmcard.png" alt=""></div>
        <div class="pricebox">
            <div class="dollar"> $ </div> <div class="price"> <p>599</p>  <span> /yr </span>  </div>
        </div><br><br>
            <div>Card servicing <br> for 1 year </div>
            <div class="button"><input class="button1" type="button" value="ORDER NOW "></div>
        </div>
</div>


    
</div>

</body>
</html>
