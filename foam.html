<!DOCTYPE html>
<html lang="en">


<head>
  
</head>
<style>
    .form{
        width: 100%;
    }
    .fname{
        display: flex;
    }
    .label{
        width: 15%;
    }
    .input{
        width: 70%;
    }
    
  
    
</style>
<body>
    
    <div class="form">
        <div action="/flex.html">
            <fieldset>
                <legend>Personal Details </legend>

                <div class="fname">
                <div class="label"><label for="">Form :</label></div>
                <div class="input"><input type="text"></div>
                 </div><br>



            <div class="fname">
                <div class="label"><label for="fname">First : </label></div>
                <div class="input"><input type="text"></div>
            </div><br>
            <div class="fname">
                <div class="label"><label for="lname">Last Name :</label></div>
                <div class="input"><input type="text"></div>
            </div><br>
                
            
               
                <div>
                <label for="gender">Gender :</label>
                <input type="radio">
                <label for="m">Male</label>
                <input type="radio">
                <label for="f">Female</label>
                </div><br>


                <div class="fname">
                    <div class="label"><label for="id">Email id :</label></div>
                    <div class="input"><input type="text"></div>
                </div>
               
                <div class="fname">
                    <div class="label"><label for="dob">Date of Birth :</label></div>
                    <div class="input"><input type="date"></div>
                </div>
               
                <div>
                     <div><label for="address">Address :</label></div>
                     <textarea name="address" id="" cols="30" rows="3"></textarea>
                </div>
               
                <div><input type="submit"></div>

            </fieldset>


        </div>
    </div>
      
       


        
        
           
            

    </form>

</body>
</html>
